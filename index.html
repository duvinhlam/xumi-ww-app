<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xumi Wonder Weeks</title>
    
    <!-- PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Xumi WW">
    <meta name="theme-color" content="#1A1625">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <header class="top-nav">
        <div class="nav-title">🍼 Xumi WW</div>
        <div class="nav-date" id="nav-date"></div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="app-content">
        <!-- Rendered by JS -->
    </main>

    <!-- Bottom Tab Bar -->
    <nav class="bottom-tabs">
        <button class="tab-btn active" data-tab="wonder_weeks">
            <span class="tab-icon">👶</span>
            <span class="tab-label">Wonder Weeks</span>
        </button>
        <button class="tab-btn" data-tab="vaccination">
            <span class="tab-icon">💉</span>
            <span class="tab-label">Tiêm phòng</span>
        </button>
        <button class="tab-btn" data-tab="profiles">
            <span class="tab-icon">📋</span>
            <span class="tab-label">Hồ sơ bé</span>
        </button>
    </nav>

    <!-- Modals Container -->
    <div id="modal-container"></div>

    <!-- Scripts -->
    <script src="./js/data_manager.js"></script>
    <script src="./js/wonder_weeks_data.js"></script>
    <script src="./js/vaccination_data.js"></script>
    <script src="./js/tips_data.js"></script>
    <script src="./js/app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service worker registration failed', err));
            });
        }
    </script>
</body>
</html>
